services:
  - type: web
    name: court-vision-api
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements_production.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /api/health
